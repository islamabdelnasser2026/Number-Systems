<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Systems </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🔢 التحويل بين الأنظمة مع شرح الخطوات</h1>
     <p class="subtitle">   الأنظمة العددية</p>

    <div class="input-card">
        <label>أدخل الرقم المراد تحويله:</label>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="مثلاً: 1010 أو 25 أو 1A">
            <select id="fromBase">
                <option value="10">عشري (Decimal)</option>
                <option value="2">ثنائي (Binary)</option>
                <option value="16">سداسي عشر (Hex)</option>
                <option value="8">ثماني (Octal)</option>
            </select>
        </div>
    </div>

    <div class="buttons-grid">
        <button onclick="processConversion(2)">Convert To Binary</button>
        <button onclick="processConversion(10)">Convert To Decimal</button>
        <button onclick="processConversion(8)">Convert To Octal</button>
        <button onclick="processConversion(16)">Convert To Hex</button>
        <button onclick="clearAll()" style="background: #ce2929;">Delete</button>
    </div>

    <div id="resultCard" class="result-card" style="display: none;">
        <div class="final-res-box">
            <span>النتيجة النهائية:</span>
            <strong id="finalResult"></strong>
        </div>
        <hr>
        <h4>📝 خطوات الحل :</h4>
        <div id="stepsContainer"></div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
